<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Map v27.0 Firebase-Backed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin:0; padding:0; height: 100vh; overflow: hidden; font-family: 'Microsoft JhengHei', sans-serif; background: #e2e8f0; }
        #app { width: 100vw; height: 100vh; position: relative; }
        
        /* Map Container */
        #map { width: 100%; height: 100%; }

        /* Google Maps InfoWindow 樣式微調 (隱藏預設滾動條) */
        .gm-style-iw-d { overflow: hidden !important; }
        
        /* 狀態列淡出動畫 */
        .fade-out { opacity: 0; visibility: hidden; transition: opacity 1s ease-out, visibility 1s ease-out; }
    </style>
</head>
<body>

    <div id="app">
        <!-- Google Map 將渲染於此 -->
        <div id="map"></div>

        <!-- 懸浮圖例說明 (左上角) -->
        <div class="absolute top-5 left-5 bg-white/90 backdrop-blur-sm p-4 rounded-lg shadow-lg z-10 border border-slate-200">
            <div class="text-sm font-bold text-slate-800 mb-3 border-b border-slate-200 pb-1 flex items-center gap-2">
                <i class="fas fa-map-marked-alt text-blue-500"></i> 工程實績圖例
            </div>
            <div class="flex flex-col gap-2.5 text-sm font-bold text-slate-600">
                <div class="flex items-center gap-3">
                    <span class="w-4 h-4 rounded-full shadow-sm" style="background:#f97316"></span> 專案工程
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-4 h-4 rounded-full shadow-sm" style="background:#10b981"></span> 社區建置
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-4 h-4 rounded-full shadow-sm" style="background:#3b82f6"></span> 家充設備
                </div>
            </div>
        </div>

        <!-- 懸浮系統狀態列 (頂部置中) -->
        <div id="status-overlay" class="absolute top-5 left-1/2 transform -translate-x-1/2 bg-slate-900/85 text-white px-5 py-2.5 rounded-full shadow-[0_4px_20px_rgba(0,0,0,0.3)] text-xs font-bold z-50 flex items-center gap-2.5 backdrop-blur-md transition-all duration-500">
            <i id="sys-status-icon" class="fas fa-spinner fa-spin text-blue-400 text-sm"></i> 
            <span id="sys-status-text" class="tracking-wide">系統初始化...</span>
        </div>
    </div>

    <!-- Firebase v11 & 核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🚀 設定區
        // ==========================================
        const CONFIG = {
            RAGIC_SERVER: "ap14",
            RAGIC_PATH: "ChuckChargingCC/ragicproject-management/7",
            MAP_KEY: "AIzaSyDIYt9AZImHlL7xpb-30cyYOuAXsFufufw",
            PREFILL_RAGIC_KEY: "aE9KcVErZy9iTTJQWDJCeWZLaFM2RUtQRXd2bGxnS1lxYm9PN0pPc1J2bmRzRnN2blRzTE9JSHNyQmpnM1dPVA==" 
        };

        const FIELDS = { NAME: "1000167", CAT: "1000372", ADDR: "1000190", COORDS: "1000417" };
        const COLORS = { "專案": "#f97316", "家充": "#3b82f6", "社區": "#10b981", "default": "#64748b" };


        // 歷史家充資料已遷移至 Firebase cases collection
        // 如需重新遷移，請執行 migrate.html

        let map, geocoder, allData = [];
        let markers = [];
        let bounds;
        let globalInfoWindow = null; // 唯一資訊視窗實例
        
        let db, auth, currentUser;
        let cloudCache = {};
        let casesCache = {}; // Firebase cases collection (歷史資料備份)
        
        // --- 狀態控制函式 (懸浮列) ---
        function setSysStatus(msg, iconClass, autoHide = false) {
            const overlay = document.getElementById('status-overlay');
            const textEl = document.getElementById('sys-status-text');
            const iconEl = document.getElementById('sys-status-icon');
            
            if (overlay && textEl && iconEl) {
                overlay.classList.remove('fade-out');
                textEl.innerText = msg;
                iconEl.className = iconClass;

                if (autoHide) {
                    setTimeout(() => { overlay.classList.add('fade-out'); }, 4000);
                }
            }
        }

        // --- 內部 Log ---
        function log(msg, type='info') {
            if (type === 'err') console.error(`[EV-Map] ${msg}`);
            else if (type === 'warn') console.warn(`[EV-Map] ${msg}`);
            else console.log(`[EV-Map] ${msg}`);
        }

        // --- Firebase 初始化 ---
        const initFirebase = async () => {
            try {
                let firebaseConfig;
                let isPreviewEnv = false;
                
                if (typeof __firebase_config !== 'undefined' && __firebase_config && __firebase_config !== '{}') {
                    firebaseConfig = JSON.parse(__firebase_config);
                    isPreviewEnv = true;
                } else {
                    firebaseConfig = {
                        apiKey: "AIzaSyCGqiHwPv2ero7SVmqN5gkyfqDh5o2AEjo",
                        authDomain: "ev-map-1470c.firebaseapp.com",
                        projectId: "ev-map-1470c",
                        storageBucket: "ev-map-1470c.firebasestorage.app",
                        messagingSenderId: "314662873363",
                        appId: "1:314662873363:web:d2124b85c423ab2bf7d2e6"
                    };
                }
                
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                if (isPreviewEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        setupFirestoreListener(isPreviewEnv);
                        setTimeout(() => { window.loadData(); }, 1000); // 連線成功後載入資料
                    } else {
                        setSysStatus('系統未登入', 'fas fa-exclamation-triangle text-red-400');
                    }
                });
            } catch (e) {
                console.error("Firebase Init Error:", e);
                setSysStatus('資料庫連線異常，正在嘗試離線載入', 'fas fa-wifi text-red-400');
                setTimeout(() => { window.loadData(); }, 1500); // 失敗防呆
            }
        };

        // --- 監聽 Firestore 快取變更 ---
        const setupFirestoreListener = (isPreviewEnv) => {
            if (!currentUser) return;
            const currentAppId = typeof __app_id !== 'undefined' && isPreviewEnv ? __app_id : 'ev-map-production';
            const cacheRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'coords_cache');
            
            onSnapshot(cacheRef, (snapshot) => {
                cloudCache = {};
                snapshot.forEach(docSnap => { cloudCache[docSnap.id] = docSnap.data(); });
                log(`雲端快取同步完成，共 ${Object.keys(cloudCache).length} 筆座標`, 'success');
                if (allData.length > 0) renderMarkersOnly();
            }, (error) => {
                log(`雲端快取讀取錯誤: ${error.message}`, 'err');
            });

            // 監聽 cases collection (歷史資料備份)
            const casesRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'cases');
            onSnapshot(casesRef, (snapshot) => {
                casesCache = {};
                snapshot.forEach(docSnap => { casesCache[docSnap.id] = docSnap.data(); });
                log(`歷史案件同步完成，共 ${Object.keys(casesCache).length} 筆`, 'success');
            }, (error) => {
                log(`歷史案件讀取錯誤: ${error.message}`, 'err');
            });

            window.currentAppId = currentAppId;
        };

        // --- Google Maps 初始化 ---
        window.initMap = function() {
            try {
                const mapEl = document.getElementById("map");
                if (!mapEl) return;
                
                map = new google.maps.Map(mapEl, { 
                    center: { lat: 23.6, lng: 120.9 }, 
                    zoom: 8, 
                    mapTypeControl: false,
                    streetViewControl: false,
                    fullscreenControl: true
                });
                
                geocoder = new google.maps.Geocoder();
                bounds = new google.maps.LatLngBounds();
                globalInfoWindow = new google.maps.InfoWindow(); 
                
                log("Google Maps API 載入完成", "info");
            } catch (e) { 
                log("地圖載入失敗: " + e.message, "err"); 
                setSysStatus('地圖載入失敗', 'fas fa-exclamation-circle text-red-400');
            }
        };

        // --- 繪製自訂圖釘 ---
        function getCustomPin(color) {
            const width = 36; const height = 48;
            const svgData = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" width="${width}" height="${height}">
                    <path fill="${color}" stroke="#ffffff" stroke-width="2" d="M172.268 501.67C26.97 291.031 0 269.413 0 192 0 85.961 85.961 0 192 0s192 85.961 192 192c0 77.413-26.97 99.031-172.268 309.67-9.535 13.774-29.93 13.773-39.464 0z"/>
                    <circle cx="192" cy="192" r="85" fill="#ffffff" />
                    <path fill="${color}" d="M207.3 261.2c-2.4 4.5-8.5 5.5-12.3 2L135 225.5c-3-2.8-3.9-7.1-2.2-10.9L157.4 160H122c-4.4 0-8-3.6-8-8v-16c0-4.4 3.6-8 8-8h80c5.4 0 9.4 5.2 7.9 10.4l-19.4 69.6h31.5c4.7 0 8.7 3.2 9.8 7.8 1.1 4.5-1.1 9.2-5.1 11.2l-35.4 24.2z"/>
                </svg>`;
            return {
                url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svgData)}`,
                scaledSize: new google.maps.Size(width, height),
                anchor: new google.maps.Point(width/2, height)
            };
        }

        // --- 去識別化工具函式 ---
        function deidentify(item) {
            const cat = item[FIELDS.CAT] || '';
            if (cat === '家充') {
                const name = item[FIELDS.NAME] || '';
                if (name.length > 0) item[FIELDS.NAME] = name.charAt(0) + '宅';

                const addr = item[FIELDS.ADDR] || '';
                if (addr) {
                    const match = addr.match(/(.*?(?:路|街|大道)(?:[一二三四五六七八九十\d]+段)?)/);
                    if (match) {
                        item[FIELDS.ADDR] = match[1];
                    } else {
                        const idx = addr.search(/[\d巷弄號樓]/);
                        if (idx !== -1) item[FIELDS.ADDR] = addr.substring(0, idx);
                    }
                }
            }
            return item;
        }

        // --- Ragic JSONP 分頁讀取（突破 1000 筆限制）---
        function fetchRagicPage(offset) {
            return new Promise((resolve, reject) => {
                const cbName = 'ragicCb_' + Date.now() + '_' + offset;
                const timeout = setTimeout(() => { delete window[cbName]; reject(new Error('Timeout')); }, 30000);

                window[cbName] = function(res) {
                    clearTimeout(timeout);
                    delete window[cbName];
                    resolve(res);
                };

                const key = CONFIG.PREFILL_RAGIC_KEY;
                const url = `https://${CONFIG.RAGIC_SERVER}.ragic.com/${CONFIG.RAGIC_PATH}?api&naming=EID&APIKey=${encodeURIComponent(key)}&limit=1000&offset=${offset}&callback=${cbName}`;
                const script = document.createElement('script');
                script.src = url;
                script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Network error')); };
                document.body.appendChild(script);
            });
        }

        async function fetchAllRagicPages() {
            const allRecords = [];
            let offset = 0;
            const limit = 1000;

            while (true) {
                try {
                    const res = await fetchRagicPage(offset);
                    if (!res || res.status === 'ERROR') break;
                    const records = Object.values(res);
                    allRecords.push(...records);
                    log(`Ragic 第 ${Math.floor(offset/limit)+1} 頁：${records.length} 筆`);
                    if (records.length < limit) break;
                    offset += limit;
                } catch (e) {
                    log('Ragic 分頁讀取失敗: ' + e.message, 'err');
                    break;
                }
            }
            return allRecords;
        }

        // --- 將 Ragic 新資料備份到 Firebase cases collection ---
        async function syncToFirebase(items) {
            if (!currentUser || !db) return;
            const targetAppId = window.currentAppId || 'ev-map-production';
            let synced = 0;

            for (const item of items) {
                const docId = String(item._ragicId);
                if (casesCache[docId]) continue; // 已存在，跳過

                try {
                    const docRef = doc(db, 'artifacts', targetAppId, 'public', 'data', 'cases', docId);
                    await setDoc(docRef, {
                        name: item[FIELDS.NAME] || '',
                        address: item[FIELDS.ADDR] || '',
                        category: item[FIELDS.CAT] || '',
                        coords: item[FIELDS.COORDS] || '',
                        source: 'ragic',
                        updatedAt: new Date().toISOString()
                    });
                    synced++;
                } catch (e) {
                    log(`備份失敗 ${docId}: ${e.message}`, 'warn');
                }
            }
            if (synced > 0) log(`已備份 ${synced} 筆新資料到 Firebase`);
        }

        // --- 1. 讀取 Ragic + Firebase 歷史資料，合併後顯示 ---
        window.loadData = async function() {
            setSysStatus('正在同步即時資料庫...', 'fas fa-sync-alt fa-spin text-blue-400');

            // Step 1: 從 Firebase cases 載入歷史資料
            const historicalData = Object.entries(casesCache).map(([id, c]) => ({
                _ragicId: id,
                [FIELDS.NAME]: c.name || '',
                [FIELDS.CAT]: c.category || '',
                [FIELDS.ADDR]: c.address || '',
                [FIELDS.COORDS]: c.coords || ''
            }));
            log(`Firebase 歷史資料：${historicalData.length} 筆`);

            // Step 2: 從 Ragic 讀取即時資料（含分頁）
            let ragicData = [];
            try {
                ragicData = await fetchAllRagicPages();
                log(`Ragic 即時資料：${ragicData.length} 筆`);
            } catch (e) {
                log('Ragic 讀取失敗，僅使用歷史資料: ' + e.message, 'warn');
                setSysStatus('Ragic 連線異常，使用歷史資料', 'fas fa-wifi text-yellow-400');
            }

            // Step 3: 過濾 Ragic 資料
            ragicData = ragicData.filter(item => {
                const addr = item[FIELDS.ADDR];
                const name = item[FIELDS.NAME] || '';
                if (name.includes('酷澎倉庫')) return false;
                const isCancelled = Object.values(item).some(val =>
                    typeof val === 'string' && val.includes('取消')
                );
                if (isCancelled) return false;
                return addr && typeof addr === 'string' && addr.trim().length > 0;
            }).map(item => deidentify(item));

            // Step 4: 合併（Ragic 為主，歷史資料補充）
            const ragicIds = new Set(ragicData.map(d => String(d._ragicId)));
            const uniqueHistorical = historicalData.filter(h => !ragicIds.has(h._ragicId));

            allData = [...ragicData, ...uniqueHistorical];
            renderMarkersOnly();

            // Step 5: 將 Ragic 新資料備份到 Firebase
            syncToFirebase(ragicData);

            // Step 6: 檢查是否需要背景地理編碼
            let needsSync = false;
            for (let i = 0; i < allData.length; i++) {
                const coordsRaw = allData[i][FIELDS.COORDS];
                const docId = String(allData[i]._ragicId);
                const hasOriginalCoords = coordsRaw && coordsRaw.includes(',') && !isNaN(parseFloat(coordsRaw.split(',')[0]));
                const hasCache = !!cloudCache[docId];
                if (!hasOriginalCoords && !hasCache) {
                    needsSync = true; break;
                }
            }

            if (needsSync) {
                setSysStatus('發現新工程，正在繪製地圖...', 'fas fa-cogs fa-spin text-yellow-400');
                setTimeout(() => { window.startDynamicMapping(); }, 1500);
            } else {
                setSysStatus(`✅ 地圖資料已是最新狀態（共 ${allData.length} 筆）`, 'fas fa-check-circle text-green-400', true);
            }
        };

        // --- 將所有資料轉化為圖釘 ---
        function renderMarkersOnly() {
            markers.forEach(m => m.setMap(null));
            markers = [];
            bounds = new google.maps.LatLngBounds();

            allData.forEach((item) => {
                const id = item._ragicId;
                const name = item[FIELDS.NAME] || '(無名稱)';
                const addr = item[FIELDS.ADDR];
                const cat = item[FIELDS.CAT] || '未分類';
                const coordsRaw = item[FIELDS.COORDS];
                
                const color = COLORS[cat] || COLORS['default'];
                
                const hasOriginalCoords = coordsRaw && coordsRaw.includes(',') && !isNaN(parseFloat(coordsRaw.split(',')[0]));
                
                // 💡 使用唯一 ID 對應雲端快取
                const docId = String(id); 
                const cacheData = cloudCache[docId];
                const hasCache = !!cacheData;
                
                if (hasOriginalCoords) {
                    const [lat, lng] = coordsRaw.split(',').map(Number);
                    addMarkerToMap(id, name, addr, lat, lng, color, cat);
                } else if (hasCache && cacheData.coords) {
                    const [lat, lng] = cacheData.coords.split(',').map(Number);
                    addMarkerToMap(id, name, addr, lat, lng, color, cat);
                }
            });
            
            if (markers.length > 0) map.fitBounds(bounds);
        }

        // --- 2. 啟動動態解析並上傳 Firebase ---
        window.startDynamicMapping = async function() {
            if (!geocoder || !currentUser) return;

            for (let i = 0; i < allData.length; i++) {
                const item = allData[i];
                const id = item._ragicId;
                const name = item[FIELDS.NAME] || '未命名';
                const addr = item[FIELDS.ADDR];
                const coordsRaw = item[FIELDS.COORDS];
                const cat = item[FIELDS.CAT] || '未分類';
                const color = COLORS[cat] || COLORS['default'];

                const hasOriginalCoords = coordsRaw && coordsRaw.includes(',') && !isNaN(parseFloat(coordsRaw.split(',')[0]));
                
                // 💡 使用唯一 ID
                const docId = String(id);
                const hasCache = !!cloudCache[docId];
                
                if (!hasOriginalCoords && !hasCache) {
                    let success = false;
                    let retries = 0;

                    while (!success && retries < 3) {
                        try {
                            const loc = await new Promise((resolve, reject) => {
                                geocoder.geocode({ address: addr }, (res, status) => {
                                    if (status === 'OK' && res.length > 0) resolve(res[0].geometry.location);
                                    else reject(status);
                                });
                            });

                            const lat = loc.lat();
                            const lng = loc.lng();
                            const coordsStr = `${lat},${lng}`;

                            const targetAppId = window.currentAppId || 'ev-map-production';
                            const docRef = doc(db, 'artifacts', targetAppId, 'public', 'data', 'coords_cache', docId);
                            await setDoc(docRef, { coords: coordsStr, address: addr, updatedAt: new Date().toISOString() });

                            addMarkerToMap(id, name, addr, lat, lng, color, cat);
                            success = true;
                        } catch (e) {
                            if (e === 'OVER_QUERY_LIMIT') {
                                retries++;
                                await new Promise(r => setTimeout(r, 2000));
                            } else {
                                break;
                            }
                        }
                    }
                    await new Promise(r => setTimeout(r, 800)); 
                }
            }

            setSysStatus('✅ 地圖資料已是最新狀態', 'fas fa-check-circle text-green-400', true);
            if (markers.length > 0) map.fitBounds(bounds);
        }

        // --- 核心：建立圖釘與精美點擊資訊卡 ---
        function addMarkerToMap(id, name, addr, lat, lng, color, cat) {
            let markerZIndex = 1;
            if (cat === '專案' || cat === '社區') markerZIndex = 1000;
            else if (cat === '家充') markerZIndex = 10;

            const marker = new google.maps.Marker({
                position: {lat, lng}, 
                map: map, 
                title: name, 
                icon: getCustomPin(color), 
                zIndex: markerZIndex
            });
            
            marker.addListener('click', () => {
                const contentHtml = `
                    <div style="font-family: 'Microsoft JhengHei', sans-serif; min-width: 220px; max-width: 280px; padding: 2px 0;">
                        <div style="border-left: 5px solid ${color}; padding-left: 10px;">
                            <span style="background-color: ${color}; color: white; padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block;">
                                ${cat}
                            </span>
                            <h3 style="margin: 8px 0 6px 0; font-size: 15px; font-weight: 800; color: #1f2937; line-height: 1.3;">
                                ${name}
                            </h3>
                            <p style="margin: 0; font-size: 12px; color: #6b7280; display: flex; align-items: flex-start; gap: 6px; font-weight: 500;">
                                <i class="fas fa-map-marker-alt" style="color: #9ca3af; margin-top: 2px;"></i> 
                                <span>${addr}</span>
                            </p>
                        </div>
                    </div>
                `;

                globalInfoWindow.setContent(contentHtml);
                globalInfoWindow.open({ anchor: marker, map, shouldFocus: false });

                map.panTo({lat, lng});
                if (map.getZoom() < 14) map.setZoom(14);
            });
            
            markers.push(marker);
            bounds.extend({lat, lng});
        }

        // --- 頁面啟動程序 ---
        window.addEventListener('DOMContentLoaded', () => {
            initFirebase(); 
            
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${CONFIG.MAP_KEY}&callback=initMap&language=zh-TW`;
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
        });

    </script>
</body>
</html>
