        window.startMigration = async function() {
            const btn = document.getElementById('btn');
            const progress = document.getElementById('progress');
            const bar = document.getElementById('bar');
            const countEl = document.getElementById('count');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '遷移中...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            progress.classList.remove('hidden');

            try {
                await signInAnonymously(auth);
            } catch (e) {
                result.classList.remove('hidden');
                result.innerHTML = `<div class="text-red-600">Firebase 登入失敗：${e.message}</div>`;
                return;
            }

            const lines = DATA.trim().split('\n').filter(l => l.trim());
            const total = lines.length;
            const appId = 'ev-map-production';
            let success = 0;
            let failed = 0;

            for (let i = 0; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length < 2) continue;

                const name = parts[0].trim();
                const address = parts.slice(1).join(',').trim();
                const docId = 'OLD_HC_' + i;

                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cases', docId);
                    await setDoc(docRef, {
                        name: name,
                        address: address,
                        category: '家充',
                        source: 'static_migration',
                        updatedAt: new Date().toISOString()
                    });
                    success++;
                } catch (e) {
                    console.error(`Failed ${docId}:`, e);
                    failed++;
                }

                const pct = Math.round(((i + 1) / total) * 100);
                bar.style.width = pct + '%';
                countEl.textContent = `${i + 1} / ${total}`;
            }

            result.classList.remove('hidden');
            if (failed === 0) {
                result.innerHTML = `<div class="bg-green-50 border border-green-200 rounded-lg p-3 text-green-800">
                    ✅ 遷移完成！成功推送 ${success} 筆資料到 Firebase。<br>
                    此檔案可以安全刪除。
                </div>`;
            } else {
                result.innerHTML = `<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-yellow-800">
                    ⚠️ 遷移完成。成功 ${success} 筆，失敗 ${failed} 筆。<br>
                    可重新執行此頁面，已存在的資料會自動跳過。
                </div>`;
            }

            btn.textContent = '遷移完成';
        };
    </script>
